name: Notify Cloudine on labeled issues

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  notify:
    if: contains(fromJson('["cloudine","agent:cloudine"]'), github.event.label.name)
    runs-on: ubuntu-latest
    steps:
      - name: Mention Cloudine agent
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: [
                '@cloudine-agent @claudine automated trigger from label `' + context.payload.label.name + '`.',
                '',
                'Please implement this issue using one branch and one PR.',
                'Request Codex review before merge.'
              ].join('\n')
            });
