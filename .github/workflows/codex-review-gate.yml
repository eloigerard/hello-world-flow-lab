name: codex-review-gate

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  codex-review-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Codex approval label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map(l => l.name);
            const ok = labels.includes('codex-approved');

            core.summary
              .addHeading('Codex Review Gate')
              .addRaw(ok
                ? '✅ `codex-approved` label found. Gate passed.'
                : '❌ Missing `codex-approved` label. Gate failed.')
              .write();

            if (!ok) {
              core.setFailed('Missing required label: codex-approved');
            }

      - name: Post guidance comment when blocked
        if: failure() && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '🔒 Codex review gate is blocking this PR.',
                '',
                'To pass:',
                '1) Request/complete Codex review',
                '2) Add label `codex-approved`',
                '',
                'Once the label is present, this check will pass automatically.'
              ].join('\n')
            });
